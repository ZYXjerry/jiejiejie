<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>媒体画廊 | 跨设备同步相册</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>📁 全能文件画廊 <span>图片 · 视频 · 文档</span></h1>
            <p class="subtitle">上传后永久保存，任何设备访问此链接均可查看</p>
        </header>

        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">📁📄</div>
            <div class="upload-text">
                <strong>点击或拖拽文件到此区域</strong><br>
                支持图片、视频、PDF、文本文件、Word、Excel、PPT (最大 100MB)
            </div>
            <input type="file" id="fileInput" multiple accept="image/jpeg,image/png,image/gif,image/webp,video/mp4,video/webm,video/quicktime,application/pdf,text/plain,text/csv,application/json,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.presentationml.presentation" />
            <button class="upload-btn" id="uploadBtn" type="button">选择文件</button>
        </div>

        <div class="gallery-toolbar">
            <div class="stats" id="statsDisplay">📦 0 个文件</div>
            <button class="clear-all-btn" id="clearAllBtn" title="清空所有文件">🗑️ 清空全部</button>
        </div>

        <div class="gallery-grid" id="galleryGrid">
            <div class="empty-placeholder">
                <div class="empty-icon">📂✨</div>
                <p>暂无文件，请点击上方区域上传</p>
                <small>支持多种格式，点击文件可预览</small>
            </div>
        </div>

        <footer class="app-footer">
            <p>✨ 点击卡片上的删除按钮可移除项目 | 所有文件存储在服务器，换设备访问链接即可同步</p>
        </footer>
    </div>

    <!-- 图片预览模态框 -->
    <div id="imageModal" class="modal">
        <span class="modal-close">&times;</span>
        <img class="modal-content" id="modalImg">
        <div id="modalCaption"></div>
    </div>

    <!-- 文本预览模态框 -->
    <div id="textModal" class="modal">
        <span class="modal-close" id="textModalClose">&times;</span>
        <div class="text-modal-content">
            <pre id="textContent"></pre>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
